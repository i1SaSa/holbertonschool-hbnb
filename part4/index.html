<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HBnB - Places</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="logo.png" type="image/png">
</head>

<body>

	<header>
		<a href="index.html">
			<img src="logo.png" alt="HBnB Logo" class="logo">
		</a>
		<div>
			<a href="login.html" class="login-button" id="login-link">Login</a>
			<a href="signup.html" class="login-button" id="signup-link" style="background-color: #333;">Sign Up</a>

			<a href="add_place.html" class="login-button" id="add-place-btn"
				style="display: none; background-color: #008489;">+ Add Place</a>
			<button id="logout-btn" class="login-button"
				style="display: none; background-color: #dc3545; border: none; cursor: pointer;">Logout</button>

		</div>
	</header>

	<main>
		<div style="display: flex; justify-content: space-between; align-items: center;">
			<h1>Available Places</h1>
			<div>
				<label for="price-filter"><strong>Max Price:</strong></label>
				<select id="price-filter" style="padding: 5px; border-radius: 5px;">
					<option value="All">All</option>
					<option value="10">$10</option>
					<option value="50">$50</option>
					<option value="100">$100</option>
				</select>
			</div>
		</div>

		<section class="places-container" id="places-list">
		</section>
	</main>

	<footer>
		<p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
	</footer>

	<script src="scripts.js"></script>
</body>

</html>
