<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HBnB - Sign Up</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="images/icon.png" type="image/png">
</head>

<body>
	<header>
		<a href="index.html"><img src="images/logo.png" alt="HBnB Logo" class="logo"></a>
		<a href="login.html" class="login-button">Login</a>
	</header>

	<main>
		<section class="login-container">
			<h2>Create an Account</h2>
			<form id="signup-form" class="form">
				<div class="form-group">
					<label for="first_name">First Name:</label>
					<input type="text" id="first_name" required>
				</div>
				<div class="form-group">
					<label for="last_name">Last Name:</label>
					<input type="text" id="last_name" required>
				</div>
				<div class="form-group">
					<label for="signup_email">Email:</label>
					<input type="email" id="signup_email" required>
				</div>
				<div class="form-group">
					<label for="signup_password">Password:</label>
					<input type="password" id="signup_password" required>
				</div>
				<button type="submit" class="login-button">Sign Up</button>
			</form>
		</section>
	</main>

	<footer>
		<p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
	</footer>
	<script src="scripts.js"></script>
</body>

</html>
